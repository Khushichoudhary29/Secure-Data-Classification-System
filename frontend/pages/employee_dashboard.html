<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Dashboard - Secure Data Classification</title>
<link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/components.css">

</head>
<body>
    <nav class="sidebar hidden">
        <h2>💼 Employee Portal</h2>
        <ul class="sidebar-nav">
            <li><button onclick="loadProfile()">👤 Profile</button></li>
            <li><button onclick="loadDashboard()">📊 My Stats</button></li>
            <li><button onclick="uploadFile()">⬆️ Upload</button></li>
            <li><button onclick="logout()">🚪 Logout</button></li>
        </ul>
    </nav>
    
    <button class="hamburger" onclick="toggleSidebar()" style="position: fixed; top: 20px; left: 20px; z-index: 1001;">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <main class="main">
        <div class="container">
            <header class="role-header">
                <h1>Employee Dashboard <span id="roleDisplay" class="role-badge role-employee"></span></h1>
                <button onclick="logout()" class="btn btn-danger">Logout</button>
            </header>
            
            <!-- Profile Card -->
            <div class="glass-card">
                <h2>👤 My Profile</h2>
                <div id="profileCard" class="profile-section"></div>
                <button onclick="openProfileModal()" class="btn">Edit Profile</button>
            </div>
            
            <!-- Stats -->
            <div class="stats-grid">
                <div class="stat-card glass-card">
                    <h3>My Uploads</h3>
                    <div id="myUploads" class="stat-number">0</div>
                </div>
                <div class="stat-card glass-card">
                    <h3>Activity Score</h3>
                    <div id="activityScore" class="stat-number">92%</div>
                </div>
            </div>
            
            <!-- Personal Charts -->
            <div class="charts-grid">
                <div class="chart-card glass-card">
                    <h3>My Activity</h3>
                    <canvas id="personalActivityChart"></canvas>
                </div>
                <div class="chart-card glass-card">
                    <h3>Recent Uploads</h3>
                    <canvas id="recentUploadsChart"></canvas>
                </div>
            </div>
            
            <!-- Upload Section -->
            <div class="glass-card">
                <h2>⬆️ Secure Upload</h2>
                <input type="file" id="fileInput" accept="*/*">
                <button onclick="uploadFileHelper()" class="btn">Upload File</button>
            </div>
        </div>
    </main>

    <!-- Profile Edit Modal -->
    <div id="profileModal" class="modal">
        <div class="modal-content glass-card">
            <h2>Edit Profile</h2>
            <form id="profileForm">
                <div class="form-group">
                    <label for="profileName">Full Name</label>
                    <input type="text" id="profileName">
                </div>
                <button type="submit" class="btn">Save Changes</button>
                <button onclick="closeModal()" class="btn btn-danger">Cancel</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/charts.js"></script>
    <script src="../js/employee.js"></script>
</body>
</html>
