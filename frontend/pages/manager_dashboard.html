<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager Dashboard - Secure Data Classification</title>
<link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/components.css">

</head>
<body>
    <nav class="sidebar hidden">
        <h2>📈 Manager Panel</h2>
        <ul class="sidebar-nav">
            <li><button onclick="loadDashboard()">📊 Dashboard</button></li>
            <li><button onclick="loadEmployees()">👥 Employees</button></li>
            <li><button onclick="uploadFile()">⬆️ Upload</button></li>
            <li><button onclick="logout()">🚪 Logout</button></li>
        </ul>
    </nav>
    
    <button class="hamburger" onclick="toggleSidebar()" style="position: fixed; top: 20px; left: 20px; z-index: 1001;">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <main class="main">
        <div class="container">
            <header class="role-header">
                <h1>Manager Dashboard <span id="roleDisplay" class="role-badge role-manager"></span></h1>
                <button onclick="logout()" class="btn btn-danger">Logout</button>
            </header>
            
            <!-- Stats Cards -->
            <div class="stats-grid">
                <div class="stat-card glass-card">
                    <h3>Total Employees</h3>
                    <div id="totalEmployees" class="stat-number">0</div>
                </div>
                <div class="stat-card glass-card">
                    <h3>Team Performance</h3>
                    <div id="teamPerformance" class="stat-number">85%</div>
                </div>
                <div class="stat-card glass-card">
                    <h3>Uploads</h3>
                    <div id="teamUploads" class="stat-number">12</div>
                </div>
            </div>
            
            <!-- Charts -->
            <div class="charts-grid">
                <div class="chart-card glass-card">
                    <h3>Employee Performance</h3>
                    <canvas id="performanceChart"></canvas>
                </div>
                <div class="chart-card glass-card">
                    <h3>Team Activity</h3>
                    <canvas id="teamActivityChart"></canvas>
                </div>
            </div>
            
            <!-- Employees Table -->
            <div class="glass-card">
                <h2>👥 Team Members</h2>
                <div class="table-container">
                    <table id="employeesTable">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Performance</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
            
            <!-- Upload Section -->
            <div class="glass-card">
                <h2>⬆️ Secure File Upload</h2>
                <input type="file" id="fileInput" accept="*/*">
                <button onclick="uploadFileHelper()" class="btn">Upload</button>
            </div>
        </div>
    </main>

    <!-- Employee Edit Modal -->
    <div id="employeeModal" class="modal">
        <div class="modal-content glass-card">
            <h2>Edit Employee</h2>
            <form id="employeeForm">
                <div class="form-group">
                    <label for="editName">Name</label>
                    <input type="text" id="editName">
                </div>
                <div class="form-group">
                    <label for="editEmail">Email</label>
                    <input type="email" id="editEmail">
                </div>
                <button type="submit" class="btn">Save</button>
                <button onclick="closeModal()" class="btn btn-danger">Cancel</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/charts.js"></script>
    <script src="../js/manager.js"></script>
</body>
</html>
